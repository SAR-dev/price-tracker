<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Tracker Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          mono: ['Roboto Mono', 'monospace'],
        },
        colors: {
          ink:    { DEFAULT: '#0b0c10', 50: '#f0f0f2', 100: '#e0e0e5', 200: '#b8b9c5', 300: '#8e90a2', 400: '#63657e', 500: '#3c3f57', 600: '#2a2d42', 700: '#1e2133', 800: '#141724', 900: '#0b0c10' },
          ember:  { DEFAULT: '#ff6b35', light: '#ff9165', dark: '#cc4f1f' },
          ice:    { DEFAULT: '#38bdf8', dark: '#0ea5e9' },
          jade:   { DEFAULT: '#34d399', dark: '#10b981' },
          rose:   { DEFAULT: '#f87171', dark: '#ef4444' },
          gold:   { DEFAULT: '#fbbf24', dark: '#d97706' },
        },
        animation: {
          'fade-in': 'fadeIn .25s ease-out',
          'slide-up': 'slideUp .3s cubic-bezier(.16,1,.3,1)',
          'pulse-dot': 'pulseDot 2s infinite',
        },
        keyframes: {
          fadeIn:   { from: { opacity: 0 }, to: { opacity: 1 } },
          slideUp:  { from: { opacity: 0, transform: 'translateY(12px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
          pulseDot: { '0%,100%': { opacity: 1 }, '50%': { opacity: .25 } },
        },
      }
    }
  }
</script>
<style>
  * { box-sizing: border-box; }
  body { background: #0b0c10; }

  /* custom scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2d42; border-radius: 99px; }

  /* grid noise overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,107,53,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .tracker-card { transition: border-color .2s, box-shadow .2s; }
  .tracker-card:hover { border-color: rgba(255,107,53,.35) !important; box-shadow: 0 0 0 1px rgba(255,107,53,.15); }
  .tracker-card.selected { border-color: #ff6b35 !important; box-shadow: 0 0 0 1px rgba(255,107,53,.3); }

  .tab-btn.active { background: rgba(255,107,53,.15); color: #ff9165; border-color: rgba(255,107,53,.4); }

  input, textarea { outline: none !important; }
  input:focus, textarea:focus, select:focus { box-shadow: 0 0 0 1px #ff6b35 !important; }

  .mono { font-family: 'Roboto Mono', monospace; }

  .stat-badge {
    font-family: 'Roboto Mono', monospace;
    font-size: 11px; padding: 2px 8px;
    border-radius: 4px; font-weight: 500;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin .7s linear infinite; }

  .range-btn.active { background: rgba(255,107,53,.2); color: #ff9165; border-color: rgba(255,107,53,.5); }
</style>
</head>
<body class="font-sans text-ink-100 min-h-screen relative z-10">

<!-- ── TOP BAR ── -->
<header class="border-b border-ink-700 bg-ink-900/80 backdrop-blur-sm sticky top-0 z-50">
  <div class="max-w-screen-xl mx-auto px-6 h-14 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <span class="text-ember font-black text-xl tracking-tight">PRICE<span class="text-ink-300">WATCH</span></span>
      <span class="text-ink-500 text-xs mono hidden sm:block">/ dynamic tracker</span>
    </div>
    <div class="flex items-center gap-2">
      <div id="global-status" class="flex items-center gap-2 text-xs mono text-ink-400 px-3 py-1.5 bg-ink-800 border border-ink-700 rounded-full">
        <span class="w-1.5 h-1.5 rounded-full bg-ink-500" id="status-dot"></span>
        <span id="status-text">—</span>
      </div>
      <button onclick="openModal()" class="flex items-center gap-1.5 bg-ember text-white text-sm font-bold px-4 py-1.5 rounded-lg hover:bg-ember-light transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add Tracker
      </button>
      <button onclick="fetchAll()" id="btn-fetch-all" title="Fetch all active trackers"
        class="flex items-center gap-1.5 bg-ink-700 hover:bg-ink-600 text-ink-200 text-sm font-semibold px-3 py-1.5 rounded-lg transition-colors border border-ink-600">
        <svg class="w-4 h-4" id="fetch-all-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Fetch All
      </button>
    </div>
  </div>
</header>

<!-- ── MAIN LAYOUT ── -->
<div class="max-w-screen-xl mx-auto px-6 py-6 flex gap-6 min-h-[calc(100vh-56px)]">

  <!-- LEFT: tracker list -->
  <aside class="w-72 shrink-0 flex flex-col gap-3">
    <p class="text-xs mono text-ink-500 uppercase tracking-widest pl-1">Trackers</p>
    <div id="tracker-list" class="flex flex-col gap-2">
      <div class="text-ink-500 text-sm text-center py-8 mono">Loading…</div>
    </div>
  </aside>

  <!-- RIGHT: detail panel -->
  <main class="flex-1 min-w-0 flex flex-col gap-5" id="detail-panel">
    <div class="flex-1 flex items-center justify-center">
      <div class="text-center">
        <div class="text-6xl mb-4">📡</div>
        <p class="text-ink-400 text-sm mono">Select a tracker to view price history</p>
        <p class="text-ink-600 text-xs mt-1 mono">or add a new one →</p>
      </div>
    </div>
  </main>

</div>

<!-- ── ADD/EDIT MODAL ── -->
<div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
  <div class="relative bg-ink-800 border border-ink-600 rounded-2xl w-full max-w-lg shadow-2xl animate-slide-up">
    <div class="flex items-center justify-between px-6 py-4 border-b border-ink-700">
      <h2 class="font-bold text-lg" id="modal-title">Add Tracker</h2>
      <button onclick="closeModal()" class="text-ink-400 hover:text-ink-100 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-6 flex flex-col gap-4">
      <input type="hidden" id="edit-id">

      <div>
        <label class="block text-xs mono text-ink-400 mb-1.5 uppercase tracking-wider">Label</label>
        <input id="f-label" type="text" placeholder="e.g. Silver 1kg Bar"
          class="w-full bg-ink-900 border border-ink-600 rounded-lg px-4 py-2.5 text-sm text-ink-100 placeholder-ink-500 focus:border-ember transition-colors">
      </div>

      <div>
        <label class="block text-xs mono text-ink-400 mb-1.5 uppercase tracking-wider">URL</label>
        <input id="f-url" type="url" placeholder="https://ec.asahigrellia.com/view/item/…"
          class="w-full bg-ink-900 border border-ink-600 rounded-lg px-4 py-2.5 text-sm text-ink-100 placeholder-ink-500 focus:border-ember transition-colors font-mono">
      </div>

      <div>
        <label class="block text-xs mono text-ink-400 mb-1.5 uppercase tracking-wider">CSS / Attribute Selector</label>
        <input id="f-selector" type="text" placeholder='data-id="makeshop-item-price:1"'
          class="w-full bg-ink-900 border border-ink-600 rounded-lg px-4 py-2.5 text-sm text-ink-100 placeholder-ink-500 focus:border-ember transition-colors font-mono">
        <p class="text-xs text-ink-500 mt-1.5 mono">
          Examples: &nbsp;<code class="text-ink-300">data-id="foo:1"</code> &nbsp;·&nbsp; <code class="text-ink-300">.price-box</code> &nbsp;·&nbsp; <code class="text-ink-300">#item-price</code>
        </p>
      </div>

      <div id="modal-error" class="hidden text-rose text-sm mono bg-rose/10 border border-rose/30 rounded-lg px-4 py-2.5"></div>
    </div>
    <div class="px-6 pb-6 flex gap-3 justify-end">
      <button onclick="closeModal()" class="px-4 py-2 text-sm font-semibold text-ink-300 hover:text-ink-100 transition-colors">Cancel</button>
      <button onclick="saveTracker()" id="btn-save"
        class="px-5 py-2 bg-ember hover:bg-ember-light text-white text-sm font-bold rounded-lg transition-colors flex items-center gap-2">
        <span id="save-label">Save Tracker</span>
      </button>
    </div>
  </div>
</div>

<!-- ── SCRIPTS ── -->
<script>
/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let trackers      = [];
let selectedId    = null;
let detailData    = [];   // price rows for selected tracker
let chart         = null;
let currentRange  = 24;

const RANGE_HOURS = [
  { label: '24h', h: 24 },
  { label: '48h', h: 48 },
  { label: '7d',  h: 168 },
  { label: 'All', h: 0 },
];

// assign a colour per tracker id
const PALETTE = ['#ff6b35','#38bdf8','#34d399','#fbbf24','#a78bfa','#f472b6','#fb923c','#4ade80'];
const trackerColor = id => PALETTE[(id - 1) % PALETTE.length];

/* ═══════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════ */
const fmt     = n   => Number(n).toLocaleString('ja-JP');
const fmtTime = iso => new Date(iso).toLocaleString('ja-JP', {
  month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false
});
const fmtAgo = iso => {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400)return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
};

function setStatus(state, text) {
  const dot  = document.getElementById('status-dot');
  const span = document.getElementById('status-text');
  dot.className = 'w-1.5 h-1.5 rounded-full ' + (
    state === 'ok'    ? 'bg-jade animate-pulse-dot' :
    state === 'error' ? 'bg-rose' : 'bg-ink-500'
  );
  span.textContent = text;
}

/* ═══════════════════════════════════════════════════════════
   TRACKER LIST (sidebar)
═══════════════════════════════════════════════════════════ */
async function loadTrackers() {
  const r = await fetch('/api/trackers');
  trackers = await r.json();
  renderSidebar();
}

function renderSidebar() {
  const el = document.getElementById('tracker-list');
  if (!trackers.length) {
    el.innerHTML = `<div class="text-ink-500 text-xs mono text-center py-8 border border-dashed border-ink-700 rounded-xl">
      No trackers yet.<br>Click <span class="text-ember">+ Add Tracker</span> to start.
    </div>`;
    return;
  }
  el.innerHTML = trackers.map(t => {
    const color   = trackerColor(t.id);
    const sel     = t.id === selectedId;
    return `<div class="tracker-card ${sel ? 'selected' : ''} bg-ink-800 border border-ink-700 rounded-xl p-4 cursor-pointer"
                 onclick="selectTracker(${t.id})">
      <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-2 min-w-0">
          <span class="w-2 h-2 rounded-full shrink-0" style="background:${color}"></span>
          <span class="font-semibold text-sm truncate">${esc(t.label)}</span>
        </div>
        <div class="flex gap-1 shrink-0">
          <button onclick="event.stopPropagation();openModal(${t.id})" title="Edit"
            class="text-ink-500 hover:text-ink-200 transition-colors p-1 rounded">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button onclick="event.stopPropagation();deleteTracker(${t.id})" title="Delete"
            class="text-ink-500 hover:text-rose transition-colors p-1 rounded">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="mt-2 flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full ${t.active ? 'bg-jade' : 'bg-ink-500'}"></span>
        <span class="text-xs mono text-ink-400">${t.active ? 'Active' : 'Paused'}</span>
        <button onclick="event.stopPropagation();toggleTracker(${t.id})"
          class="text-[10px] mono text-ink-500 hover:text-ember ml-auto transition-colors">
          ${t.active ? 'pause' : 'resume'}
        </button>
      </div>
      <p class="text-[11px] mono text-ink-500 truncate mt-1.5">${esc(t.url)}</p>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════════
   DETAIL PANEL
═══════════════════════════════════════════════════════════ */
async function selectTracker(id) {
  selectedId = id;
  currentRange = 24;
  renderSidebar();
  renderDetailShell();
  await loadDetail();
}

function renderDetailShell() {
  const t = trackers.find(x => x.id === selectedId);
  if (!t) return;
  const color = trackerColor(t.id);

  // Destroy the existing Chart.js instance before wiping the DOM,
  // otherwise Chart.js keeps an internal reference to the old canvas
  // and throws "Canvas is already in use" when the new canvas appears.
  if (chart) {
    chart.destroy();
    chart = null;
  }

  document.getElementById('detail-panel').innerHTML = `
    <!-- header -->
    <div class="flex items-start justify-between flex-wrap gap-3">
      <div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full" style="background:${color}"></span>
          <h1 class="text-xl font-black tracking-tight">${esc(t.label)}</h1>
        </div>
        <a href="${esc(t.url)}" target="_blank" class="text-xs mono text-ink-500 hover:text-ember transition-colors mt-1 block truncate max-w-xl">${esc(t.url)}</a>
        <code class="text-[11px] mono text-ink-500 mt-0.5 block">${esc(t.selector)}</code>
      </div>
      <div class="flex gap-2 items-center">
        <div id="detail-status" class="flex items-center gap-2 text-xs mono text-ink-400 px-3 py-1.5 bg-ink-800 border border-ink-700 rounded-full">
          <span class="w-1.5 h-1.5 rounded-full bg-ink-500" id="d-dot"></span>
          <span id="d-status-text">Loading…</span>
        </div>
        <button onclick="fetchOne(${t.id})" id="btn-fetch-one"
          class="flex items-center gap-1.5 bg-ink-700 hover:bg-ember/20 border border-ink-600 hover:border-ember/50 text-ink-200 text-sm font-semibold px-4 py-1.5 rounded-lg transition-all">
          <svg class="w-4 h-4" id="fetch-one-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          Fetch Now
        </button>
      </div>
    </div>

    <!-- fetch output -->
    <pre id="fetch-output" class="hidden font-mono text-[11px] text-jade bg-ink-900 border border-ink-700 rounded-xl px-4 py-3 max-h-40 overflow-y-auto"></pre>

    <!-- stat cards -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="stat-cards">
      ${['Current Price','24h High','24h Low','Total Records'].map(l => `
        <div class="bg-ink-800 border border-ink-700 rounded-xl p-4">
          <p class="text-[10px] mono text-ink-500 uppercase tracking-widest mb-2">${l}</p>
          <p class="text-2xl font-black mono text-ink-200" style="color:${color}">—</p>
          <p class="text-[11px] mono text-ink-500 mt-1">—</p>
        </div>`).join('')}
    </div>

    <!-- chart -->
    <div class="bg-ink-800 border border-ink-700 rounded-xl p-5">
      <div class="flex items-center justify-between flex-wrap gap-3 mb-5">
        <span class="text-sm font-semibold text-ink-200">Price History</span>
        <div class="flex gap-1.5" id="range-btns">
          ${RANGE_HOURS.map((r,i) => `
            <button class="range-btn ${i===0?'active':''} text-xs mono px-3 py-1.5 border border-ink-600 text-ink-400 rounded-lg hover:border-ember/50 hover:text-ember transition-all"
              data-h="${r.h}" onclick="setRange(${r.h},this)">${r.label}</button>
          `).join('')}
        </div>
      </div>
      <div class="relative h-56">
        <canvas id="price-chart"></canvas>
      </div>
    </div>

    <!-- log table -->
    <div class="bg-ink-800 border border-ink-700 rounded-xl overflow-hidden">
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-ink-700">
        <span class="text-sm font-semibold text-ink-200">Price Log</span>
        <span class="text-[11px] mono text-ink-500">most recent first</span>
      </div>
      <div class="overflow-y-auto max-h-80">
        <table class="w-full text-sm">
          <thead class="sticky top-0 bg-ink-900">
            <tr>
              ${['Time (local)','Price (¥)','Change','Raw text'].map(h =>
                `<th class="text-left px-5 py-2.5 text-[10px] mono text-ink-500 uppercase tracking-wider font-medium">${h}</th>`
              ).join('')}
            </tr>
          </thead>
          <tbody id="price-log">
            <tr><td colspan="4" class="text-center text-ink-500 mono text-xs py-8">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function loadDetail() {
  if (!selectedId) return;
  const t = trackers.find(x => x.id === selectedId);
  if (!t) return;
  const color = trackerColor(t.id);

  try {
    const [pricesRes, summaryRes] = await Promise.all([
      fetch(`/api/trackers/${selectedId}/prices?limit=2000`),
      fetch(`/api/trackers/${selectedId}/summary`),
    ]);

    detailData = pricesRes.ok ? await pricesRes.json() : [];

    // summary
    if (summaryRes.ok) {
      const s   = await summaryRes.json();
      const cur = s.current;
      const chg = s.change_vs_prev;
      const h24 = s.last_24h;

      // update stat cards
      const cards = document.querySelectorAll('#stat-cards > div');
      if (cards[0]) {
        cards[0].querySelector('p:nth-child(2)').textContent = '¥' + fmt(cur.price_jpy);
        const sub = cards[0].querySelector('p:nth-child(3)');
        if (chg.amount_jpy !== null) {
          const sign = chg.amount_jpy >= 0 ? '+' : '';
          sub.textContent = sign + fmt(chg.amount_jpy) + ' (' + sign + chg.percent + '%)';
          sub.className   = 'text-[11px] mono mt-1 ' + (chg.amount_jpy > 0 ? 'text-rose' : chg.amount_jpy < 0 ? 'text-jade' : 'text-ink-500');
        } else {
          sub.textContent = 'First record'; sub.className = 'text-[11px] mono mt-1 text-ink-500';
        }
      }
      if (cards[1]) { cards[1].querySelector('p:nth-child(2)').textContent = h24.high_jpy ? '¥'+fmt(h24.high_jpy) : '—'; }
      if (cards[2]) { cards[2].querySelector('p:nth-child(2)').textContent = h24.low_jpy  ? '¥'+fmt(h24.low_jpy)  : '—'; }
      if (cards[3]) {
        cards[3].querySelector('p:nth-child(2)').textContent = s.all_time.total_records;
        if (s.all_time.since)
          cards[3].querySelector('p:nth-child(3)').textContent = 'since ' + fmtTime(s.all_time.since);
      }

      // status pill
      const dot  = document.getElementById('d-dot');
      const dtxt = document.getElementById('d-status-text');
      if (dot && dtxt) {
        dot.className  = 'w-1.5 h-1.5 rounded-full bg-jade animate-pulse-dot';
        dtxt.textContent = 'Live · ' + fmtAgo(cur.fetched_at);
      }
      setStatus('ok', trackers.length + ' tracker' + (trackers.length>1?'s':'') + ' · updated ' + fmtAgo(cur.fetched_at));
    } else {
      setStatus('error', 'No data yet');
      const dot  = document.getElementById('d-dot');
      const dtxt = document.getElementById('d-status-text');
      if (dot && dtxt) { dot.className = 'w-1.5 h-1.5 rounded-full bg-ink-500'; dtxt.textContent = 'No data yet'; }
    }

    // chart + log
    renderChart(filterByRange(detailData, currentRange), color);
    renderLog(detailData, color);

  } catch(e) {
    setStatus('error', e.message);
  }
}

/* ═══════════════════════════════════════════════════════════
   CHART
═══════════════════════════════════════════════════════════ */
function filterByRange(data, hours) {
  if (!hours) return data;
  const cutoff = Date.now() - hours * 3600 * 1000;
  return data.filter(p => new Date(p.fetched_at).getTime() >= cutoff);
}

function renderChart(data, color) {
  const canvas = document.getElementById('price-chart');
  if (!canvas) return;

  const points = data.map(p => ({ x: new Date(p.fetched_at), y: p.price_jpy }));

  if (chart) {
    chart.data.datasets[0].data         = points;
    chart.data.datasets[0].borderColor  = color;
    chart.data.datasets[0].backgroundColor = color + '18';
    chart.data.datasets[0].pointBackgroundColor = color;
    chart.data.datasets[0].pointRadius  = points.length > 80 ? 0 : 3;
    chart.update('none');
    return;
  }

  chart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      datasets: [{
        label: 'Price (¥)',
        data: points,
        borderColor: color,
        backgroundColor: color + '18',
        fill: true,
        tension: 0.4,
        pointRadius: points.length > 80 ? 0 : 3,
        pointHoverRadius: 5,
        borderWidth: 2,
        pointBackgroundColor: color,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e2133',
          borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1,
          titleColor: '#8e90a2',
          bodyColor: color,
          bodyFont: { family: 'Roboto Mono', size: 13 },
          titleFont: { family: 'Roboto Mono', size: 11 },
          callbacks: {
            title: items => fmtTime(items[0].raw.x.toISOString()),
            label: ctx   => ' ¥' + fmt(ctx.parsed.y),
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: {
            displayFormats: { minute: 'HH:mm', hour: 'MM/dd HH:mm', day: 'MM/dd', week: 'MM/dd', month: 'yy/MM' }
          },
          ticks: { color: '#63657e', font: { family: 'Roboto Mono', size: 10 }, maxTicksLimit: 7, maxRotation: 15 },
          grid:  { color: 'rgba(255,255,255,0.03)' },
        },
        y: {
          ticks: {
            color: '#63657e', font: { family: 'Roboto Mono', size: 10 },
            callback: v => v >= 1_000_000 ? '¥'+(v/1_000_000).toFixed(1)+'M' : '¥'+(v/1000).toFixed(0)+'k'
          },
          grid: { color: 'rgba(255,255,255,0.03)' },
        }
      }
    }
  });
}

function setRange(hours, btn) {
  currentRange = hours;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const color = trackerColor(selectedId);
  if (chart) {
    const pts = filterByRange(detailData, hours).map(p => ({ x: new Date(p.fetched_at), y: p.price_jpy }));
    chart.data.datasets[0].data = pts;
    chart.data.datasets[0].pointRadius = pts.length > 80 ? 0 : 3;
    chart.options.scales.x.min = undefined;
    chart.options.scales.x.max = undefined;
    chart.options.scales.y.min = undefined;
    chart.options.scales.y.max = undefined;
    chart.update();
  }
}

/* ═══════════════════════════════════════════════════════════
   LOG TABLE
═══════════════════════════════════════════════════════════ */
function renderLog(data, color) {
  const tbody = document.getElementById('price-log');
  if (!tbody) return;
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-ink-500 mono text-xs py-8">No data yet. Hit Fetch Now to get the first reading.</td></tr>';
    return;
  }
  const rows = [...data].reverse().map((row, i, arr) => {
    const prev = arr[i + 1];
    let changeHtml = '<span class="text-ink-600">—</span>';
    let tdCls = '';
    if (prev) {
      const diff = row.price_jpy - prev.price_jpy;
      const pct  = ((diff / prev.price_jpy) * 100).toFixed(2);
      const sign = diff >= 0 ? '+' : '';
      tdCls      = diff > 0 ? 'text-rose' : diff < 0 ? 'text-jade' : '';
      changeHtml = `${sign}${fmt(diff)} <span class="text-ink-500">(${sign}${pct}%)</span>`;
    }
    return `<tr class="border-b border-ink-700/50 hover:bg-ink-700/30 transition-colors">
      <td class="px-5 py-2.5 text-ink-500 mono text-xs">${fmtTime(row.fetched_at)}</td>
      <td class="px-5 py-2.5 font-black mono" style="color:${color}">¥${fmt(row.price_jpy)}</td>
      <td class="px-5 py-2.5 mono text-xs ${tdCls}">${changeHtml}</td>
      <td class="px-5 py-2.5 text-ink-500 mono text-xs max-w-[180px] truncate">${esc(row.raw_text||'—')}</td>
    </tr>`;
  }).join('');
  tbody.innerHTML = rows;
}

/* ═══════════════════════════════════════════════════════════
   FETCH
═══════════════════════════════════════════════════════════ */
async function fetchOne(id) {
  const btn  = document.getElementById('btn-fetch-one');
  const icon = document.getElementById('fetch-one-icon');
  const out  = document.getElementById('fetch-output');
  if (!btn) return;

  btn.disabled = true;
  if (icon) icon.classList.add('spinner');
  if (out)  { out.classList.remove('hidden'); out.textContent = 'Running scraper…\n'; }

  try {
    const r = await fetch(`/api/trackers/${id}/fetch`, { method: 'POST' });
    const d = await r.json();
    if (out) {
      out.textContent = d.output || d.message || '(no output)';
      out.className   = out.className.replace(/text-\w+/, '') + (d.status === 'ok' ? ' text-jade' : ' text-rose');
    }
    if (d.status === 'ok') await loadDetail();
  } catch(e) {
    if (out) { out.textContent = 'Error: ' + e.message; out.style.color = '#f87171'; }
  } finally {
    btn.disabled = false;
    if (icon) icon.classList.remove('spinner');
  }
}

async function fetchAll() {
  const btn  = document.getElementById('btn-fetch-all');
  const icon = document.getElementById('fetch-all-icon');
  btn.disabled = true;
  icon.classList.add('spinner');
  setStatus('', 'Fetching all…');
  try {
    const r = await fetch('/api/fetch-all', { method: 'POST' });
    const d = await r.json();
    setStatus(d.status === 'ok' ? 'ok' : 'error', d.status === 'ok' ? 'Fetch complete' : 'Fetch error');
    if (selectedId) await loadDetail();
  } catch(e) {
    setStatus('error', e.message);
  } finally {
    btn.disabled = false;
    icon.classList.remove('spinner');
  }
}

/* ═══════════════════════════════════════════════════════════
   MODAL — ADD / EDIT
═══════════════════════════════════════════════════════════ */
function openModal(id) {
  const modal = document.getElementById('modal');
  document.getElementById('modal-error').classList.add('hidden');

  if (id) {
    const t = trackers.find(x => x.id === id);
    document.getElementById('modal-title').textContent  = 'Edit Tracker';
    document.getElementById('save-label').textContent   = 'Save Changes';
    document.getElementById('edit-id').value            = t.id;
    document.getElementById('f-label').value            = t.label;
    document.getElementById('f-url').value              = t.url;
    document.getElementById('f-selector').value         = t.selector;
  } else {
    document.getElementById('modal-title').textContent = 'Add Tracker';
    document.getElementById('save-label').textContent  = 'Save Tracker';
    document.getElementById('edit-id').value   = '';
    document.getElementById('f-label').value   = '';
    document.getElementById('f-url').value     = '';
    document.getElementById('f-selector').value= '';
  }

  modal.classList.remove('hidden');
  modal.classList.add('flex');
  document.getElementById('f-label').focus();
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

async function saveTracker() {
  const errEl = document.getElementById('modal-error');
  errEl.classList.add('hidden');

  const id       = document.getElementById('edit-id').value;
  const label    = document.getElementById('f-label').value.trim();
  const url      = document.getElementById('f-url').value.trim();
  const selector = document.getElementById('f-selector').value.trim();

  if (!label || !url || !selector) {
    errEl.textContent = 'All fields are required.';
    errEl.classList.remove('hidden');
    return;
  }

  const btn  = document.getElementById('btn-save');
  const span = document.getElementById('save-label');
  btn.disabled = true; span.textContent = 'Saving…';

  try {
    const method = id ? 'PUT'  : 'POST';
    const path   = id ? `/api/trackers/${id}` : '/api/trackers';
    const r = await fetch(path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label, url, selector }),
    });
    const d = await r.json();
    if (!r.ok) {
      errEl.textContent = d.error || 'Server error';
      errEl.classList.remove('hidden');
      return;
    }
    closeModal();
    await loadTrackers();
    if (!id) await selectTracker(d.id);
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    span.textContent = id ? 'Save Changes' : 'Save Tracker';
  }
}

async function deleteTracker(id) {
  if (!confirm('Delete this tracker and all its price history?')) return;
  await fetch(`/api/trackers/${id}`, { method: 'DELETE' });
  if (selectedId === id) {
    selectedId = null;
    chart = null;
    document.getElementById('detail-panel').innerHTML = `
      <div class="flex-1 flex items-center justify-center h-64">
        <div class="text-center">
          <div class="text-5xl mb-4">📡</div>
          <p class="text-ink-400 text-sm mono">Tracker deleted. Select another or add a new one.</p>
        </div>
      </div>`;
  }
  await loadTrackers();
}

async function toggleTracker(id) {
  await fetch(`/api/trackers/${id}/toggle`, { method: 'PATCH' });
  await loadTrackers();
}

/* ═══════════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
(async function init() {
  setStatus('', 'Loading…');
  await loadTrackers();
  if (trackers.length) {
    setStatus('ok', trackers.length + ' tracker' + (trackers.length > 1 ? 's' : '') + ' ready');
  } else {
    setStatus('', 'No trackers');
  }
  // auto-refresh every 5 min
  setInterval(async () => {
    await loadTrackers();
    if (selectedId) await loadDetail();
  }, 5 * 60 * 1000);
})();
</script>
